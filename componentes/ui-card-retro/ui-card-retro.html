<div class="ui-card-retro-container">
    <div class="ui-card-retro-textarea-container">
        <textarea class="ui-card-retro-textarea" placeholder="Escreva algo..."></textarea>
        <div class="ui-card-retro-text-display"></div>
        <ui-menu-opcoes-m class="ui-card-retro-menu"></ui-menu-opcoes-m>
    </div>
    <div class="ui-card-retro-actions">
        <ui-like-dislike-m class="ui-card-retro-like"></ui-like-dislike-m>
        <ui-comment-button-m class="ui-card-retro-comment-button"></ui-comment-button-m>
        <button class="ui-card-retro-save-button">Salvar</button>
    </div>
    <div class="ui-card-retro-comment-section">
        <div class="ui-card-retro-comment-input-container">
            <textarea class="ui-card-retro-comment-textarea" placeholder="Adicione um coment&#225;rio"></textarea>
            <button class="ui-card-retro-comment-save-button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M9 16.2l-4.2-4.2L3 13.8l6 6 12-12-1.4-1.4z"></path>
                </svg>
            </button>
        </div>
        <div class="ui-card-retro-comments-list">
            <!-- Coment&#225;rios criados ser&#227;o adicionados aqui -->
        </div>
    </div>
</div>
